<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer Scheme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Color Palette</h1>
    <p>Combination of 12 Color schemes</p>
    
    <button class="buttons" id="Sunset">Sunset</button>
    <button class="buttons" id="Nature">Nature</button>
    <button class="buttons" id="Ocean">Ocean</button>
    <button class="buttons" id="Monochrome">Monochrome</button>
    <button class="buttons" id="Candy">Candy</button>
    <button class="buttons" id="Forest">Forest</button>
    <button class="buttons" id="Lavender">Lavender</button>
    <button class="buttons" id="Autumn">Autumn</button>
    <button class="buttons" id="Sky">Sky</button>
    <button class="buttons" id="Peach">Peach</button>
    <button class="buttons" id="Rose">Rose</button>
    <button class="buttons" id="Lime">Lime</button>
    <p style="font-size:small;">*Click on color-code to copy to clipboard</p>
    <div class="palette-container" id="palette" style="background-color: #d8e2dc;">
        <p>Colors will appear here!!! </p>
    </div>
    <script src="color.js"></script>
</body>
</html>
